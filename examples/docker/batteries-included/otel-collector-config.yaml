# =============================================================================
# OTel Collector — Batteries-Included Configuration
# =============================================================================
# Receives traces and metrics from RouteIQ, exports to Jaeger.
# Replace exporters with your production backend (Datadog, Grafana, X-Ray, etc.)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 50

  resource:
    attributes:
      - key: service.namespace
        value: routeiq
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert

exporters:
  # Export traces to Jaeger via OTLP
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Debug exporter for troubleshooting (logs to collector stdout)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/jaeger]

    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]
