# =============================================================================
# RouteIQ Gateway — Config for Batteries-Included Mode
# =============================================================================
# All features enabled. Customize model_list for your providers.

model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
  - model_name: claude-sonnet-4-20250514
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: env/LITELLM_MASTER_KEY
  database_url: env/DATABASE_URL
