# RouteIQ Gateway - High Availability Setup
# =============================================================================
# Production-grade HA deployment with:
#   - PostgreSQL for persistent storage
#   - Redis for caching and distributed state
#   - Two gateway replicas with leader election
#   - Nginx load balancer with streaming support
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#
# Access points:
#   - Load balancer: http://localhost:8080
#   - Gateway 1:     http://localhost:4000
#   - Gateway 2:     http://localhost:4001
#   - PostgreSQL:    localhost:5432
# =============================================================================

services:
  # ==========================================================================
  # PostgreSQL - Persistent storage
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: routeiq-ha-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm_password}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - routeiq-network

  # ==========================================================================
  # Redis - Caching and distributed state
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: routeiq-ha-redis
    command: >
      redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - routeiq-network

  # ==========================================================================
  # Gateway Replica 1 (Primary)
  # ==========================================================================
  litellm-gateway-1:
    build:
      context: ../../../
      dockerfile: docker/Dockerfile
    image: ghcr.io/baladithyab/litellm-llm-router:latest
    container_name: routeiq-ha-gateway-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ../../../config:/app/config:ro
      - ../../../models:/app/models:ro
      - ../../../custom_routers:/app/custom_routers:ro
    environment:
      - LITELLM_CONFIG_PATH=/app/config/config.openrouter.yaml
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-test-master-key-change-me}
      # Database & Cache
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:-litellm_password}@postgres:5432/${POSTGRES_DB:-litellm}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      # OpenRouter API Key
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # HA Mode - Leader Election
      - LLMROUTER_HA_MODE=${LLMROUTER_HA_MODE:-leader_election}
      - LLMROUTER_CONFIG_SYNC_LEASE_SECONDS=${LLMROUTER_CONFIG_SYNC_LEASE_SECONDS:-30}
      - LLMROUTER_CONFIG_SYNC_RENEW_INTERVAL_SECONDS=${LLMROUTER_CONFIG_SYNC_RENEW_INTERVAL_SECONDS:-10}
      # Gateway Features
      - A2A_GATEWAY_ENABLED=${A2A_GATEWAY_ENABLED:-false}
      - MCP_GATEWAY_ENABLED=${MCP_GATEWAY_ENABLED:-false}
      - STORE_MODEL_IN_DB=${STORE_MODEL_IN_DB:-true}
      # Config Sync & Hot Reload
      - CONFIG_HOT_RELOAD=${CONFIG_HOT_RELOAD:-true}
      - CONFIG_SYNC_ENABLED=${CONFIG_SYNC_ENABLED:-true}
      - CONFIG_SYNC_INTERVAL=${CONFIG_SYNC_INTERVAL:-60}
      # RouteIQ Settings
      - ROUTEIQ_USE_PLUGIN_STRATEGY=true
      - ROUTEIQ_WORKERS=2
      - ROUTEIQ_CENTROID_ROUTING=true
      - ROUTEIQ_ROUTING_PROFILE=auto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/_health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - routeiq-network

  # ==========================================================================
  # Gateway Replica 2
  # ==========================================================================
  litellm-gateway-2:
    build:
      context: ../../../
      dockerfile: docker/Dockerfile
    image: ghcr.io/baladithyab/litellm-llm-router:latest
    container_name: routeiq-ha-gateway-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4001:4000"
    volumes:
      - ../../../config:/app/config:ro
      - ../../../models:/app/models:ro
      - ../../../custom_routers:/app/custom_routers:ro
    environment:
      - LITELLM_CONFIG_PATH=/app/config/config.openrouter.yaml
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-test-master-key-change-me}
      # Database & Cache
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:-litellm_password}@postgres:5432/${POSTGRES_DB:-litellm}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      # OpenRouter API Key
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # HA Mode - Leader Election
      - LLMROUTER_HA_MODE=${LLMROUTER_HA_MODE:-leader_election}
      - LLMROUTER_CONFIG_SYNC_LEASE_SECONDS=${LLMROUTER_CONFIG_SYNC_LEASE_SECONDS:-30}
      - LLMROUTER_CONFIG_SYNC_RENEW_INTERVAL_SECONDS=${LLMROUTER_CONFIG_SYNC_RENEW_INTERVAL_SECONDS:-10}
      # Gateway Features
      - A2A_GATEWAY_ENABLED=${A2A_GATEWAY_ENABLED:-false}
      - MCP_GATEWAY_ENABLED=${MCP_GATEWAY_ENABLED:-false}
      - STORE_MODEL_IN_DB=${STORE_MODEL_IN_DB:-true}
      # Config Sync & Hot Reload
      - CONFIG_HOT_RELOAD=${CONFIG_HOT_RELOAD:-true}
      - CONFIG_SYNC_ENABLED=${CONFIG_SYNC_ENABLED:-true}
      - CONFIG_SYNC_INTERVAL=${CONFIG_SYNC_INTERVAL:-60}
      # RouteIQ Settings
      - ROUTEIQ_USE_PLUGIN_STRATEGY=true
      - ROUTEIQ_WORKERS=2
      - ROUTEIQ_CENTROID_ROUTING=true
      - ROUTEIQ_ROUTING_PROFILE=auto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/_health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - routeiq-network

  # ==========================================================================
  # Nginx Load Balancer (SSE-aware)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: routeiq-ha-nginx
    depends_on:
      - litellm-gateway-1
      - litellm-gateway-2
    ports:
      - "8080:80"
    volumes:
      - ../../../config/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - routeiq-network

volumes:
  postgres_data:
  redis_data:

networks:
  routeiq-network:
    driver: bridge
