{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "routeiq-gateway.fullname" . }}
  labels:
    {{- include "routeiq-gateway.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "routeiq-gateway.selectorLabels" . | nindent 6 }}
  endpoints:
    # GET /metrics is served on the main "http" Service port by RouteIQ's
    # Prometheus exposition endpoint (routes/metrics_endpoint.py, RouteIQ-f60a).
    # It is unauthenticated/network-scoped (same scope as /_health/*), so no
    # scrape credential is required here. Previously this path scraped a 404.
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout | default "10s" }}
      {{- with .Values.metrics.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
