{{- if .Values.metrics.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "routeiq-gateway.fullname" . }}
  labels:
    {{- include "routeiq-gateway.labels" . | nindent 4 }}
spec:
  groups:
    - name: routeiq.rules
      rules:
        - alert: RouteIQHighErrorRate
          expr: |
            sum(rate(routeiq_requests_total{status="error"}[5m])) / sum(rate(routeiq_requests_total[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RouteIQ error rate above 5%"
            description: "Error rate is {{ "{{ $value | humanizePercentage }}" }} over the last 5 minutes."

        - alert: RouteIQHighLatency
          expr: |
            histogram_quantile(0.95, sum(rate(routeiq_request_duration_seconds_bucket[5m])) by (le)) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RouteIQ p95 latency above 10s"
            description: "The 95th percentile request latency has exceeded 10 seconds for 5 minutes."

        - alert: RouteIQCircuitBreakerOpen
          expr: |
            routeiq_circuit_breaker_state{state="open"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Circuit breaker open for provider {{ "{{ $labels.provider }}" }}"
            description: "Circuit breaker is open for provider {{ "{{ $labels.provider }}" }}, requests are being rejected."

        - alert: RouteIQBudgetExhausted
          expr: |
            routeiq_budget_remaining_usd < 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Budget exhausted for workspace {{ "{{ $labels.workspace_id }}" }}"
            description: "Budget for workspace {{ "{{ $labels.workspace_id }}" }} has been exhausted."

        - alert: RouteIQHighTokenUsage
          expr: |
            sum(rate(routeiq_tokens_total[1h])) > 1000000
          for: 15m
          labels:
            severity: info
          annotations:
            summary: "Token usage exceeding 1M/hour"
            description: "Total token consumption rate has exceeded 1 million tokens per hour for 15 minutes."
{{- end }}
