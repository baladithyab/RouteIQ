{{- /*
  RouteIQ-9c4c: the chart-managed CPU/mem HPA and the KEDA ScaledObject are
  MUTUALLY EXCLUSIVE. When autoscaling.keda.enabled is true, KEDA creates and
  owns its own HPA for the Deployment, so this template emits NOTHING -- two
  HPAs targeting one Deployment fight over the replica count. KEDA owns scaling
  when on; the CPU/mem HPA is the default (keda.enabled=false).
*/ -}}
{{- if and .Values.autoscaling.enabled (not .Values.autoscaling.keda.enabled) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "routeiq-gateway.fullname" . }}
  labels:
    {{- include "routeiq-gateway.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "routeiq-gateway.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- with .Values.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
