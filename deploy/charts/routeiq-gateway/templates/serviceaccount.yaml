{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "routeiq-gateway.serviceAccountName" . }}
  labels:
    {{- include "routeiq-gateway.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- /* Automount the token when K8s leader election needs Lease API access */}}
{{- if and .Values.routeiq.leaderElection.enabled (or (eq (default "" .Values.routeiq.leaderElection.backend) "kubernetes") (not .Values.routeiq.leaderElection.backend)) }}
automountServiceAccountToken: true
{{- else }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
{{- end }}
{{- end }}
