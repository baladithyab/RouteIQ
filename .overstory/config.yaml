# Overstory configuration
# See: https://github.com/overstory/overstory

project:
  name: RouteIQ
  root: /home/codeseys/Documents/RouteIQ
  canonicalBranch: main
  qualityGates:
    - name: Tests
      command: uv run pytest tests/unit/ -x -q
      description: all unit tests must pass
    - name: Lint
      command: uv run ruff check src/ tests/
      description: zero lint errors
    - name: Typecheck
      command: uv run mypy src/litellm_llmrouter/ --ignore-missing-imports
      description: no type errors
agents:
  manifestPath: .overstory/agent-manifest.json
  baseDir: .overstory/agent-defs
  maxConcurrent: 25
  staggerDelayMs: 2000
  maxDepth: 2
  maxSessionsPerRun: 0
  maxAgentsPerLead: 5
worktrees:
  baseDir: .overstory/worktrees
taskTracker:
  backend: auto
  enabled: true
mulch:
  enabled: true
  domains: []
  primeFormat: markdown
merge:
  aiResolveEnabled: true
  reimagineEnabled: false
providers:
  anthropic:
    type: native
watchdog:
  tier0Enabled: true
  tier0IntervalMs: 30000
  tier1Enabled: false
  tier2Enabled: false
  staleThresholdMs: 300000
  zombieThresholdMs: 600000
  nudgeIntervalMs: 60000
coordinator:
  exitTriggers:
    allAgentsDone: false
    taskTrackerEmpty: false
    onShutdownSignal: false
models:
logging:
  verbose: false
  redactSecrets: true
runtime:
  default: claude
  shellInitDelayMs: 0
  pi:
    provider: anthropic
    modelMap:
      opus: anthropic/claude-opus-4-6
      sonnet: anthropic/claude-sonnet-4-6
      haiku: anthropic/claude-haiku-4-5
